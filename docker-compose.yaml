services:
  backend:
    build: ./backend
    ports:
      - "8081:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      MEDIA_MASTER_KEY: ${MEDIA_MASTER_KEY}
      CLOUDFLARE_TURN_KEY_ID: ${CLOUDFLARE_TURN_KEY_ID}
      CLOUDFLARE_TURN_API_TOKEN: ${CLOUDFLARE_TURN_API_TOKEN}
      SPRING_DATASOURCE_URL: "jdbc:h2:file:/app/data/iris;AUTO_SERVER=TRUE"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./backend/data:/app/data
    # No port mapping — only the frontend can reach it.
  
  frontend:
    build: ./frontend
    ports:
      - "8082:80"   # browser hits http://localhost:8082
    depends_on:
      - backend

volumes:
  iris-data:
