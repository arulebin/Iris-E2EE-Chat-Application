spring.application.name=iris

# --- H2 database (file-based, so data survives server restarts) ---
spring.datasource.url=jdbc:h2:file:./data/iris;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 web console (lets you browse the DB at /h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
jwt.secret=d2hhdGV2ZXJsYW1wbWFraW5nc2VudGh1bnRnZXRwbGF5ZmFjdHBlcnNvbnR5cGVicmk=
jwt.expiration-ms=3600000

logging.level.org.springframework.security=DEBUG
