spring.application.name=iris

# --- H2 database (file-based, so data survives server restarts) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/iris;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 web console (lets you browse the DB at /h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
jwt.secret=${JWT_SECRET:d2hhdGV2ZXJsYW1wbWFraW5nc2VudGh1bnRnZXRwbGF5ZmFjdHBlcnNvbnR5cGVicmk=}
jwt.expiration-ms=3600000

logging.level.org.springframework.security=DEBUG
# --- VAPID (web push identity) ---

vapid.public-key=${VAPID_PUBLIC_KEY:BITjDcev5HzL7cfAXsIx8bA0EBkZlvSFT-rm2DDirZFQehRERLq5-h8SWdFdTAoDxUODXeSGZ6gwCJEMGuvjJbU}
vapid.private-key=${VAPID_PRIVATE_KEY:RD8o5NTCEFhBOxsGQlKsROFY0Ax6luoIi3oY1mmIBZI}
vapid.subject=${VAPID_SUBJECT:mailto:ebincreations@gmail.com}

# --- Media (server-side encryption at rest for photos/videos) ---
# 32-byte AES-256 master key, base64-encoded. Default is dev-only — rotate in production
# by setting MEDIA_MASTER_KEY env var. Admin holding this key can decrypt any blob.
media.master-key=${MEDIA_MASTER_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
media.storage-dir=${MEDIA_STORAGE_DIR:./data/media}

# 50 MB cap per upload (matches the frontend's enforcement)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=51MB
