spring.application.name=iris

# --- H2 database (file-based, so data survives server restarts) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/iris;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 web console (lets you browse the DB at /h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=3600000

logging.level.org.springframework.security=INFO
# --- VAPID (web push identity) ---

vapid.public-key=${VAPID_PUBLIC_KEY}
vapid.private-key=${VAPID_PRIVATE_KEY}
vapid.subject=${VAPID_SUBJECT:mailto}

# --- Media (server-side encryption at rest for photos/videos) ---
media.master-key=${MEDIA_MASTER_KEY}
media.storage-dir=${MEDIA_STORAGE_DIR:./data/media}

# --- Cloudflare TURN Credentials ---
cloudflare.turn.key-id=${CLOUDFLARE_TURN_KEY_ID:}
cloudflare.turn.api-token=${CLOUDFLARE_TURN_API_TOKEN:}

# 50 MB cap per upload (matches the frontend's enforcement)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=51MB
